<body>

  <h1>Фазы Луны сегодня</h1>

  <div class="label">Выберите дату:</div>
  <input type="date" id="dateInput">

  <div class="label">Выберите город:</div>
  <select id="city">
    <option value="Москва">Москва</option>
    <option value="Санкт-Петербург">Санкт-Петербург</option>
    <option value="Новосибирск">Новосибирск</option>
    <option value="Екатеринбург">Екатеринбург</option>
    <option value="Казань">Казань</option>
    <option value="Нижний Новгород">Нижний Новгород</option>
    <option value="Челябинск">Челябинск</option>
    <option value="Самара">Самара</option>
    <option value="Омск">Омск</option>
    <option value="Ростов-на-Дону">Ростов-на-Дону</option>
    <option value="Уфа">Уфа</option>
    <!-- Добавляй новые города сюда по желанию -->
  </select>

  <br>
  <button onclick="showMoonPhase()">Показать фазу Луны</button>

  <div id="result"></div>

  <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
  <script>
    // Координаты городов (lat, lon) — скрыты от пользователя
    const cities = {
      "Москва":          { lat: 55.7558, lon: 37.6173 },
      "Санкт-Петербург": { lat: 59.9343, lon: 30.3351 },
      "Новосибирск":     { lat: 55.0084, lon: 82.9357 },
      "Екатеринбург":    { lat: 56.8389, lon: 60.6057 },
      "Казань":          { lat: 55.8304, lon: 49.0661 },
      "Нижний Новгород": { lat: 56.2965, lon: 43.9361 },
      "Челябинск":       { lat: 55.1644, lon: 61.4368 },
      "Самара":          { lat: 53.1959, lon: 50.1002 },
      "Омск":            { lat: 54.9884, lon: 73.3242 },
      "Ростов-на-Дону":  { lat: 47.2225, lon: 39.7203 },
      "Уфа":             { lat: 54.7388, lon: 55.9726 }
    };

    function showMoonPhase() {
      const dateStr = document.getElementById('dateInput').value;
      const date = dateStr ? new Date(dateStr) : new Date();
      const selectedCity = document.getElementById('city').value;
      const coords = cities[selectedCity] || cities["Москва"]; // fallback
      const moonIllum = SunCalc.getMoonIllumination(date);
      const moonTimes = SunCalc.getMoonTimes(date, coords.lat, coords.lon);
      let phaseName = '';
      if (moonIllum.fraction < 0.03) phaseName = 'Новолуние';
      else if (moonIllum.fraction < 0.47) phaseName = 'Растущая Луна';
      else if (moonIllum.fraction < 0.53) phaseName = 'Полнолуние';
      else phaseName = 'Убывающая Луна';
      const percent = Math.round(moonIllum.fraction * 100);
      let moonRiseSet = '';
      if (moonTimes.rise) {
        moonRiseSet += `<strong>Восход Луны:</strong> ${moonTimes.rise.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'})}<br>`;
      }
      if (moonTimes.set) {
        moonRiseSet += `<strong>Заход Луны:</strong> ${moonTimes.set.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'})}<br>`;
      }
      if (moonTimes.alwaysUp) moonRiseSet = '<strong>Луна не заходит (полярный день)</strong><br>';
      if (moonTimes.alwaysDown) moonRiseSet = '<strong>Луна не восходит (полярная ночь)</strong><br>';
      document.getElementById('result').innerHTML = `
        <strong>Город:</strong> ${selectedCity}<br>
        <strong>Дата:</strong> ${date.toLocaleDateString('ru-RU')}<br>
        <strong>Фаза:</strong> ${phaseName}<br>
        <strong>Освещённость:</strong> ${percent}%<br>
        <div class="emoji">${getMoonEmoji(percent)}</div>
        ${moonRiseSet}
        <p><strong>Рекомендация:</strong> ${getRecommendation(moonIllum.fraction)}</p>
      `;
    }

    function getMoonEmoji(percent) {
      if (percent <= 1) return '🌑';
      if (percent <= 25) return '🌒';
      if (percent <= 49) return '🌓';
      if (percent <= 51) return '🌔';
      if (percent <= 75) return '🌕';
      if (percent <= 99) return '🌖';
      return '🌗';
    }

    function getRecommendation(fraction) {
      if (fraction < 0.03 || fraction > 0.97) {
        return 'Новолуние — время отдыха, планирования, начала новых дел, медитации.';
      }
      if (fraction < 0.5) {
        return 'Растущая Луна — сажайте растения, которые растут вверх (огурцы, помидоры, зелень, цветы), стригите волосы для роста, начинайте проекты.';
      }
      if (fraction > 0.5) {
        return 'Убывающая Луна — сажайте корнеплоды, собирайте урожай, делайте заготовки, стригите волосы для укрепления, занимайтесь очисткой организма.';
      }
      return 'Полнолуние — пик энергии, эмоциональная кульминация, но лучше избегать серьёзных решений и операций.';
    }

    // Устанавливаем сегодняшнюю дату и сразу показываем результат
    window.onload = function() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('dateInput').value = today;
      showMoonPhase();
    };
  </script>
