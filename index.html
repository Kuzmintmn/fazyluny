<body>

  <main>
    <h1>Фазы Луны сегодня</h1>

    <div class="form-group">
      <div class="label">Выберите дату:</div>
      <input type="date" id="dateInput">
    </div>

    <div class="form-group">
      <div class="label">Введите город:</div>
      <div class="city-search-container">
        <input type="text" id="cityInput" placeholder="Начните вводить город...">
        <ul id="citySuggestions"></ul>
      </div>
    </div>

    <button onclick="showMoonPhase()">Показать фазу Луны</button>

    <div id="result"></div>

    <p class="cookie-notice">
      Сайт использует cookie и Яндекс.Метрику для анализа посещаемости.<br>
      Продолжая пользоваться сайтом, вы соглашаетесь с <a href="/politika-konfidencialnosti.html">Политикой конфиденциальности</a>.
    </p>
  </main>

  <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
  <script>
    const cities = {
      "Москва": { lat: 55.7558, lon: 37.6173 },
      "Санкт-Петербург": { lat: 59.9343, lon: 30.3351 },
      "Новосибирск": { lat: 55.0084, lon: 82.9357 },
      "Екатеринбург": { lat: 56.8389, lon: 60.6057 },
      "Казань": { lat: 55.8304, lon: 49.0661 },
      "Нижний Новгород": { lat: 56.2965, lon: 43.9361 },
      "Челябинск": { lat: 55.1644, lon: 61.4368 },
      "Самара": { lat: 53.1959, lon: 50.1002 },
      "Омск": { lat: 54.9884, lon: 73.3242 },
      "Ростов-на-Дону": { lat: 47.2225, lon: 39.7203 },
      "Уфа": { lat: 54.7388, lon: 55.9726 },
      "Красноярск": { lat: 56.0153, lon: 92.8932 },
      "Воронеж": { lat: 51.6615, lon: 39.2003 },
      "Пермь": { lat: 58.009, lon: 56.249 },
      "Волгоград": { lat: 48.7080, lon: 44.5133 },
      "Краснодар": { lat: 45.0355, lon: 38.9753 },
      "Саратов": { lat: 51.5331, lon: 46.0343 },
      "Тюмень": { lat: 57.1522, lon: 65.5272 },
      "Тольятти": { lat: 53.5078, lon: 49.4204 },
      "Ижевск": { lat: 56.8333, lon: 53.2047 },
      "Барнаул": { lat: 53.3468, lon: 83.7765 },
      "Ульяновск": { lat: 54.3167, lon: 48.3833 },
      "Иркутск": { lat: 52.2869, lon: 104.3050 },
      "Хабаровск": { lat: 48.4808, lon: 135.0719 },
      "Ярославль": { lat: 57.6261, lon: 39.8845 },
      "Владивосток": { lat: 43.1056, lon: 131.8735 },
      "Махачкала": { lat: 42.9764, lon: 47.5024 },
      "Томск": { lat: 56.4977, lon: 84.9744 },
      "Оренбург": { lat: 51.7667, lon: 55.1000 },
      "Кемерово": { lat: 55.3333, lon: 86.0833 },
      "Новокузнецк": { lat: 53.7557, lon: 87.1099 },
      "Рязань": { lat: 54.6095, lon: 39.7126 },
      "Астрахань": { lat: 46.3497, lon: 48.0408 },
      "Пенза": { lat: 53.2007, lon: 45.0000 },
      "Липецк": { lat: 52.6031, lon: 39.5708 },
      "Тула": { lat: 54.2048, lon: 37.6182 },
      "Киров": { lat: 58.5967, lon: 49.6601 },
      "Чебоксары": { lat: 56.1439, lon: 47.2489 },
      "Калининград": { lat: 54.7104, lon: 20.4522 },
      "Брянск": { lat: 53.2435, lon: 34.3634 },
      "Курск": { lat: 51.7373, lon: 36.1873 },
      "Иваново": { lat: 57.0003, lon: 40.9739 },
      "Магнитогорск": { lat: 53.4117, lon: 58.9844 },
      "Тверь": { lat: 56.8596, lon: 35.9119 },
      "Ставрополь": { lat: 45.0445, lon: 41.9691 },
      "Белгород": { lat: 50.5975, lon: 36.5888 },
      "Архангельск": { lat: 64.5393, lon: 40.5187 },
      "Владимир": { lat: 56.1290, lon: 40.4070 },
      "Севастополь": { lat: 44.6166, lon: 33.5254 },
      "Чита": { lat: 52.0333, lon: 113.5009 },
      "Калуга": { lat: 54.5070, lon: 36.2523 }
    };

    const cityInput = document.getElementById('cityInput');
    const suggestions = document.getElementById('citySuggestions');

    cityInput.addEventListener('input', function() {
      const query = this.value.trim().toLowerCase();
      suggestions.innerHTML = '';
      if (query.length < 2) {
        suggestions.style.display = 'none';
        return;
      }

      const matches = Object.keys(cities).filter(city =>
        city.toLowerCase().includes(query)
      ).slice(0, 10);

      if (matches.length === 0) {
        suggestions.style.display = 'none';
        return;
      }

      matches.forEach(city => {
        const li = document.createElement('li');
        li.textContent = city;
        li.addEventListener('click', () => {
          cityInput.value = city;
          suggestions.style.display = 'none';
          showMoonPhase();
        });
        suggestions.appendChild(li);
      });

      suggestions.style.display = 'block';
    });

    document.addEventListener('click', function(e) {
      if (!cityInput.contains(e.target) && !suggestions.contains(e.target)) {
        suggestions.style.display = 'none';
      }
    });

    function showMoonPhase() {
      const dateStr = document.getElementById('dateInput').value;
      const date = dateStr ? new Date(dateStr) : new Date();

      let selectedCity = cityInput.value.trim();
      const coords = cities[selectedCity] || cities["Москва"];

      const moonIllum = SunCalc.getMoonIllumination(date);
      const moonTimes = SunCalc.getMoonTimes(date, coords.lat, coords.lon);

      let phaseName = '';
      if (moonIllum.fraction < 0.03) phaseName = 'Новолуние';
      else if (moonIllum.fraction < 0.47) phaseName = 'Растущая Луна';
      else if (moonIllum.fraction < 0.53) phaseName = 'Полнолуние';
      else phaseName = 'Убывающая Луна';

      const percent = Math.round(moonIllum.fraction * 100);

      let moonRiseSet = '';
      if (moonTimes.rise) moonRiseSet += `<strong>Восход Луны:</strong> ${moonTimes.rise.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'})}<br>`;
      if (moonTimes.set) moonRiseSet += `<strong>Заход Луны:</strong> ${moonTimes.set.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'})}<br>`;
      if (moonTimes.alwaysUp) moonRiseSet = '<strong>Луна не заходит (полярный день)</strong><br>';
      if (moonTimes.alwaysDown) moonRiseSet = '<strong>Луна не восходит (полярная ночь)</strong><br>';

      document.getElementById('result').innerHTML = `
        <strong>Город:</strong> ${selectedCity || 'Москва (по умолчанию)'}<br>
        <strong>Дата:</strong> ${date.toLocaleDateString('ru-RU')}<br>
        <strong>Фаза:</strong> ${phaseName}<br>
        <strong>Освещённость:</strong> ${percent}%<br>
        <div class="emoji">${getMoonEmoji(percent)}</div>
        ${moonRiseSet}
        <p><strong>Рекомендация:</strong> ${getRecommendation(moonIllum.fraction)}</p>
      `;
    }

    function getMoonEmoji(percent) {
      if (percent <= 1) return '🌑';
      if (percent <= 25) return '🌒';
      if (percent <= 49) return '🌓';
      if (percent <= 51) return '🌔';
      if (percent <= 75) return '🌕';
      if (percent <= 99) return '🌖';
      return '🌗';
    }

    function getRecommendation(fraction) {
      if (fraction < 0.03 || fraction > 0.97) return 'Новолуние — время отдыха, планирования, начала новых дел, медитации.';
      if (fraction < 0.5) return 'Растущая Луна — сажайте растения, которые растут вверх (огурцы, помидоры, зелень, цветы), стригите волосы для роста, начинайте проекты.';
      if (fraction > 0.5) return 'Убывающая Луна — сажайте корнеплоды, собирайте урожай, делайте заготовки, стригите волосы для укрепления, занимайтесь очисткой организма.';
      return 'Полнолуние — пик энергии, эмоциональная кульминация, но лучше избегать серьёзных решений и операций.';
    }

    window.onload = function() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('dateInput').value = today;
      showMoonPhase();
    };
  </script>
